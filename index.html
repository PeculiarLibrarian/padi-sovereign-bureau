<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>The Living Library // Shattered Ceilings</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #020617;
      --bg2: #0f172a;
      --bg3: #1e293b;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --meta: 'JetBrains Mono', monospace;
      --border: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100%; width: 100%;
      overflow: hidden;
      touch-action: none;
    }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 15px; z-index: 100;
      background: var(--bg-deep); transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 48px; height: 48px; border: 3px solid rgba(59,130,246,0.15);
      border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand-header {
      position: absolute; top: 0; width: 100%; padding: 1.5rem; z-index: 20;
      display: flex; justify-content: space-between; align-items: flex-start;
      background: linear-gradient(to bottom, rgba(2,6,23,0.95) 70%, transparent);
      pointer-events: none;
    }
    h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.5px; }
    .tagline { font-size: 0.75rem; opacity: 0.7; max-width: 400px; margin-top: 4px; }
    .status-pill {
      font-family: var(--meta); font-size: 0.6rem; font-weight: 700;
      display: flex; align-items: center; gap: 6px; padding: 5px 12px;
      border-radius: 20px; border: 1px solid var(--border); background: var(--bg2);
      pointer-events: auto;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; box-shadow: 0 0 8px #10b981; }
    svg { width: 100%; height: 100%; cursor: grab; display: block; }
    .node-circle { stroke-width: 2px; transition: r 0.3s, filter 0.3s; cursor: pointer; }
    .node-circle.illuminated { filter: drop-shadow(0 0 12px rgba(255,255,255,0.4)); }
    .node-circle.shadow { stroke-dasharray: 2,2; opacity: 0.6; }
    .node-label { font-family: var(--meta); font-size: 8px; fill: var(--muted); pointer-events: none; text-transform: uppercase; }
    .node-detail-panel {
      position: absolute; bottom: 1.5rem; left: 1.5rem; width: 340px;
      background: rgba(15,23,42,0.96); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 16px; padding: 25px;
      z-index: 30; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }
    .cat-tag { font-family: var(--meta); font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 4px; color: white; }
  </style>
</head>
<body>

<div id="loading"><div class="loader-ring"></div><p style="font-family:var(--meta);font-size:10px;color:var(--accent)">MAPPING VOICES...</p></div>

<header class="brand-header">
  <div>
    <div style="font-family:var(--meta);font-size:0.6rem;color:var(--accent)">WECODED 2026 // TRIBUTE</div>
    <h1>The Living Library</h1>
    <p class="tagline">A sovereign architecture celebrating 42 pioneers who broke the glass ceiling.</p>
  </div>
  <div class="status-pill"><div class="dot"></div><span id="node-count">0 VOICES</span></div>
</header>

<svg id="viz"></svg>

<div class="node-detail-panel" id="detail" style="display:none;">
  <button onclick="this.parentElement.style.display='none'" style="float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;">×</button>
  <span class="cat-tag" id="d-cat"></span>
  <h2 id="d-name" style="margin-top:15px; font-size: 1.3rem;"></h2>
  <p id="d-bio" style="margin-top:10px; font-size:14px; opacity:0.85; line-height:1.5;"></p>
</div>

<script>
  const COLORS = { 'Computing':'#a855f7', 'Mathematics':'#ec4899', 'Systems':'#3b82f6', 'AI Ethics':'#10b981', 'Justice':'#f59e0b', 'Medicine':'#ef4444' };
  
  const SEED = [
    { id:'h1', name:'Ada Lovelace', category:'Computing', bio:'Wrote the first algorithm for a machine (1843).', status:'shadow' },
    { id:'h2', name:'Katherine Johnson', category:'Mathematics', bio:'NASA mathematician who calculated Apollo 11 moon landing.', status:'shadow' },
    { id:'h3', name:'Gladys West', category:'Mathematics', bio:'Mathematical architect of GPS technology.', status:'shadow' },
    { id:'h4', name:'Hedy Lamarr', category:'Systems', bio:'Co-inventor of frequency-hopping technology (Wi-Fi).', status:'shadow' },
    { id:'h5', name:'Radia Perlman', category:'Systems', bio:'The "Mother of the Internet"; inventor of STP.', status:'shadow' },
    { id:'h6', name:'Margaret Hamilton', category:'Computing', bio:'Apollo software lead; coined "software engineering".', status:'shadow' },
    { id:'h7', name:'Dorothy Vaughan', category:'Computing', bio:'NASA’s first Black supervisor; FORTRAN expert.', status:'shadow' },
    { id:'h8', name:'Mary Jackson', category:'Mathematics', bio:'NASA’s first Black female engineer.', status:'shadow' },
    { id:'h9', name:'Ada E. Yonath', category:'Medicine', bio:'Nobel laureate for pioneering ribosome structure work.', status:'shadow' },
    { id:'h10', name:'Annie Easley', category:'Computing', bio:'NASA rocket scientist and energy researcher.', status:'shadow' },
    { id:'h11', name:'Grace Hopper', category:'Computing', bio:'Compiler inventor; COBOL pioneer; Rear Admiral.', status:'shadow' },
    { id:'h12', name:'Shafi Goldwasser', category:'Mathematics', bio:'Turing Award winner; zero-knowledge proofs co-inventor.', status:'shadow' },
    { id:'h13', name:'Alice Ball', category:'Medicine', bio:'Developed the first effective leprosy treatment.', status:'shadow' },
    { id:'h14', name:'Anita Borg', category:'Systems', bio:'Founder of the Grace Hopper Celebration.', status:'shadow' },
    { id:'h15', name:'Daphne Koller', category:'AI Ethics', bio:'Coursera co-founder; AI and healthcare leader.', status:'shadow' },
    { id:'h16', name:'Mary Lou Jepsen', category:'Systems', bio:'Display tech innovator and Openwater founder.', status:'shadow' },
    { id:'h17', name:'Ursula Burns', category:'Systems', bio:'First Black female CEO of a Fortune 500 (Xerox).', status:'shadow' },
    { id:'h18', name:'Susan Wojcicki', category:'Systems', bio:'Former YouTube CEO; digital advertising pioneer.', status:'shadow' },
    { id:'h19', name:'Marissa Mayer', category:'Computing', bio:'Early Google engineer and former Yahoo CEO.', status:'shadow' },
    { id:'h20', name:'Ginni Rometty', category:'Systems', bio:'First female CEO of IBM.', status:'shadow' },
    { id:'h21', name:'Sheryl Sandberg', category:'Systems', bio:'Former Facebook COO; author of "Lean In".', status:'shadow' },
    { id:'m1', name:'Timnit Gebru', category:'AI Ethics', bio:'Co-founder of Black in AI; bias research leader.', status:'illuminated' },
    { id:'m2', name:'Joy Buolamwini', category:'Justice', bio:'Founder of the Algorithmic Justice League.', status:'illuminated' },
    { id:'m3', name:'Fei-Fei Li', category:'AI Ethics', bio:'ImageNet creator; Human-Centered AI pioneer.', status:'illuminated' },
    { id:'m4', name:'Kimberly Bryant', category:'Justice', bio:'Founder of Black Girls Code.', status:'illuminated' },
    { id:'m5', name:'Latanya Sweeney', category:'Justice', bio:'Data privacy pioneer; k-anonymity creator.', status:'illuminated' },
    { id:'m6', name:'Elizabeth Churchill', category:'Systems', bio:'HCI expert and Director at Google.', status:'illuminated' },
    { id:'m7', name:'Cynthia Breazeal', category:'Systems', bio:'Social robotics pioneer at MIT.', status:'illuminated' },
    { id:'m8', name:'Rana el Kaliouby', category:'AI Ethics', bio:'Affective computing pioneer; Emotion AI leader.', status:'illuminated' },
    { id:'m9', name:'Safiya Umoja Noble', category:'Justice', bio:'Author of "Algorithms of Oppression".', status:'illuminated' },
    { id:'m10', name:'Ruha Benjamin', category:'Justice', bio:'Author of "Race After Technology".', status:'illuminated' },
    { id:'m11', name:'Cynthia Dwork', category:'Justice', bio:'Pioneer of differential privacy and fairness.', status:'illuminated' },
    { id:'m12', name:'Danah Boyd', category:'Systems', bio:'Founder of Data & Society.', status:'illuminated' },
    { id:'m13', name:'Ayo Tometi', category:'Justice', bio:'Co-founder of BLM; strategy and tech activist.', status:'illuminated' },
    { id:'m14', name:'Stacey Abrams', category:'Justice', bio:'Advocate for data-driven civic technology.', status:'illuminated' },
    { id:'m15', name:'Amanda Nguyen', category:'Justice', bio:'Rise CEO; civil rights and space advocate.', status:'illuminated' },
    { id:'m16', name:'Arlan Hamilton', category:'Systems', bio:'Founder of Backstage Capital.', status:'illuminated' },
    { id:'m17', name:'Angie Jones', category:'Computing', bio:'Java Champion and automation architect.', status:'illuminated' },
    { id:'m18', name:'Parisa Tabriz', category:'Systems', bio:'Google "Security Princess"; Chrome security lead.', status:'illuminated' },
    { id:'m19', name:'Jade Raymond', category:'Computing', bio:'Founder of Haven Studios.', status:'illuminated' },
    { id:'m20', name:'Reshma Saujani', category:'Justice', bio:'Founder of Girls Who Code.', status:'illuminated' },
    { id:'m21', name:'Megan Smith', category:'Systems', bio:'3rd US Chief Technology Officer; former Google VP.', status:'illuminated' }
  ];

  let nodes = [...SEED], links = [], simulation, svg, container, zoom;

  function boot() {
    links = [];
    nodes.forEach((a, i) => nodes.forEach((b, j) => {
      if(i < j && a.category === b.category) links.push({ source: a.id, target: b.id });
    }));
    initViz();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('node-count').textContent = `${nodes.length} VOICES`;
  }

  function initViz() {
    d3.select("#viz").selectAll("*").remove();
    const w = window.innerWidth, h = window.innerHeight;
    const isMob = w < 768;
    const baseR = isMob ? 10 : 16;

    svg = d3.select("#viz").attr("viewBox", [0, 0, w, h]);
    container = svg.append("g");
    zoom = d3.zoom().scaleExtent([0.1, 5]).on("zoom", (e) => container.attr("transform", e.transform));
    svg.call(zoom);

    simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(isMob ? 80 : 120))
      .force("charge", d3.forceManyBody().strength(isMob ? -150 : -250))
      .force("center", d3.forceCenter(w / 2, h / 2).strength(1))
      .force("collide", d3.forceCollide().radius(d => (d.status === 'illuminated' ? baseR * 1.5 : baseR) + 12));

    const link = container.append("g").selectAll("line").data(links).join("line")
      .attr("stroke", "#475569").attr("stroke-opacity", 0.15);

    const g = container.append("g").selectAll("g").data(nodes).join("g")
      .on("click", (e, d) => showDetail(d))
      .call(d3.drag().on("start", dragStart).on("drag", dragging).on("end", dragEnd));

    g.append("circle").attr("r", d => d.status === 'illuminated' ? baseR * 1.3 : baseR)
      .attr("class", d => `node-circle ${d.status}`)
      .attr("fill", d => COLORS[d.category] || "#64748b")
      .attr("stroke", "rgba(255,255,255,0.2)");

    g.append("text").attr("class", "node-label").attr("dy", d => (d.status === 'illuminated' ? baseR * 2.4 : baseR * 2))
      .attr("text-anchor", "middle").style("font-size", isMob ? "7px" : "9px").text(d => d.name);

    simulation.on("tick", () => {
      link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      g.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    setTimeout(() => {
      const b = container.node().getBBox();
      if (!b.width) return;
      const s = 0.85 / Math.max(b.width / w, b.height / h);
      svg.transition().duration(1000).call(zoom.transform, d3.zoomIdentity.translate(w/2, h/2).scale(s).translate(-(b.x+b.width/2), -(b.y+b.height/2)));
    }, 1200);
  }

  function showDetail(d) {
    const el = document.getElementById('detail');
    document.getElementById('d-name').textContent = d.name;
    document.getElementById('d-cat').textContent = d.category;
    document.getElementById('d-cat').style.background = COLORS[d.category];
    document.getElementById('d-bio').textContent = d.bio;
    el.style.display = 'block';
  }

  function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.2).restart(); d.fx = d.x; d.fy = d.y; }
  function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
  function dragEnd(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
  window.addEventListener('resize', () => initViz());
  boot();
</script>
</body>
</html>
