<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PADI Sovereign Bureau: Living Library of Access</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root { --bg-deep: #020617; --bg2: #0f172a; --bg3: #1e293b; --text: #f8fafc; --muted: #94a3b8; --border: rgba(255,255,255,0.08); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html { background: var(--bg-deep); color: var(--text); font-family: 'Inter', sans-serif; height: 100%; width: 100%; overflow: hidden; touch-action: none; }
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; background: var(--bg-deep); transition: opacity 0.5s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader-ring { width: 36px; height: 36px; border: 2px solid rgba(59,130,246,0.2); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .brand-header { position: absolute; top: 0; width: 100%; padding: 1.25rem 1.5rem; z-index: 20; pointer-events: none; background: linear-gradient(to bottom, rgba(2,6,23,0.95) 60%, transparent); }
    .padi-id { font-family: 'JetBrains Mono'; font-size: 0.6rem; color: #3b82f6; letter-spacing: 1px; }
    h1 { font-size: 1.1rem; font-weight: 700; margin: 2px 0; }
    .status-bar { position: absolute; top: 1.25rem; right: 1.5rem; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .status-pill { font-family: 'JetBrains Mono'; font-size: 0.55rem; padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border); background: var(--bg2); display: flex; align-items: center; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; }
    .dot.warn { background: #f59e0b; }
    .node-detail-panel { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); width: 90%; max-width: 360px; background: rgba(15,23,42,0.98); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 1.1rem; z-index: 30; box-shadow: 0 25px 50px -10px rgba(0,0,0,0.8); }
    .cat-tag { font-family: 'JetBrains Mono'; font-size: 0.55rem; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; color: white; }
    svg { width: 100%; height: 100%; cursor: grab; }
    .link { stroke-opacity: 0.2; stroke-width: 1px; }
    .node-label { font-family: 'JetBrains Mono'; font-size: 8px; fill: var(--muted); pointer-events: none; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="loading"><div class="loader-ring"></div><p>SYNCHRONIZING PADI NODES...</p></div>
<header class="brand-header">
  <div class="padi-id">PADI SOVEREIGN BUREAU</div>
  <h1>The Living Library of Access</h1>
</header>
<div class="status-bar">
  <div class="status-pill"><div class="dot" id="status-dot"></div><span id="status-label">CONNECTING</span></div>
  <div class="status-pill"><span id="node-count">0 NODES</span></div>
</div>
<svg id="viz"></svg>
<div class="node-detail-panel" id="detail" style="display:none;">
  <button style="float:right; background:none; border:none; color:white; cursor:pointer;" onclick="closeDetail()">×</button>
  <span class="cat-tag" id="d-cat"></span>
  <div id="d-name" style="margin: 6px 0; font-weight:700;"></div>
  <div id="d-bio" style="font-size:0.8rem; opacity:0.8;"></div>
</div>

<script>
const SERVER = window.location.origin;
const WS_URL = SERVER.replace('http', 'ws');
const CATEGORY_COLORS = { 'Computing': '#a855f7', 'Mathematics': '#ec4899', 'Systems': '#3b82f6', 'AI Ethics': '#10b981', 'Justice': '#f59e0b', 'Medicine': '#ef4444', 'Meta': '#64748b' };
let nodes = [], links = [], simulation, svgSel, containerSel;

async function boot() {
  try {
    const res = await fetch(`${SERVER}/graph`);
    const data = await res.json();
    nodes = data.nodes;
    links = data.edges.flatMap(e => e.to.map(t => ({ source: e.from, target: t })));
    document.getElementById('status-label').textContent = 'LIVE';
    document.getElementById('status-dot').className = 'dot';
  } catch (e) {
    document.getElementById('status-label').textContent = 'OFFLINE';
    document.getElementById('status-dot').className = 'dot warn';
  }
  initViz();
  document.getElementById('loading').classList.add('hidden');
}

function initViz() {
  const W = window.innerWidth, H = window.innerHeight;
  svgSel = d3.select('#viz');
  containerSel = svgSel.append('g');
  svgSel.call(d3.zoom().on('zoom', (e) => containerSel.attr('transform', e.transform)));

  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-150))
    .force('x', d3.forceX(W / 2).strength(0.08))
    .force('y', d3.forceY(H / 2).strength(0.08))
    .force('collision', d3.forceCollide().radius(25));

  const linkSel = containerSel.append('g').selectAll('line').data(links).join('line').attr('class', 'link').attr('stroke', '#475569');
  const nodeSel = containerSel.append('g').selectAll('g').data(nodes).join('g')
    .call(d3.drag().on('start', dragStarted).on('drag', dragged).on('end', dragEnded))
    .on('click', (e, d) => showDetail(d));

  nodeSel.append('circle').attr('r', 15).attr('fill', d => CATEGORY_COLORS[d.category] || '#64748b');
  nodeSel.append('text').attr('class', 'node-label').attr('dy', 25).attr('text-anchor', 'middle').text(d => d.name);

  simulation.on('tick', () => {
    linkSel.attr('x1', d => d.source.x).attr('y1', d => d.source.y).attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });
  document.getElementById('node-count').textContent = `${nodes.length} NODES`;
}

function showDetail(d) {
  document.getElementById('d-cat').textContent = d.category;
  document.getElementById('d-cat').style.background = CATEGORY_COLORS[d.category];
  document.getElementById('d-name').textContent = d.name;
  document.getElementById('d-bio').textContent = d.bio;
  document.getElementById('detail').style.display = 'block';
}
function closeDetail() { document.getElementById('detail').style.display = 'none'; }
function dragStarted(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnded(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
boot();
</script>
</body>
</html>
