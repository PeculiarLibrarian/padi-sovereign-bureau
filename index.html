<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PADI Sovereign Bureau: The Living Library // Shattered Ceilings</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #020617;
      --bg2:     #0f172a;
      --bg3:     #1e293b;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
      --accent:  #3b82f6;
      --meta:    'JetBrains Mono', monospace;
      --border:  rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100%; width: 100%;
      overflow: hidden;
      touch-action: none;
    }

    /* --- LOADING --- */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 15px; z-index: 100;
      background: var(--bg-deep);
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 48px; height: 48px;
      border: 3px solid rgba(59,130,246,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-family: var(--meta); font-size: 11px; color: var(--accent); letter-spacing: 2px; }

    /* --- HEADER --- */
    .brand-header {
      position: absolute; top: 0; width: 100%;
      padding: 1.5rem; z-index: 20;
      display: flex; justify-content: space-between; align-items: flex-start;
      background: linear-gradient(to bottom, rgba(2,6,23,0.95) 70%, transparent);
      pointer-events: none;
    }
    .padi-id { font-family: var(--meta); font-size: 0.6rem; color: var(--accent); letter-spacing: 1px; font-weight: 700; }
    h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; margin-top: 2px; }
    .tagline { font-size: 0.7rem; opacity: 0.7; max-width: 400px; line-height: 1.4; margin-top: 4px; }
    
    .status-bar { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; pointer-events: auto; }
    .status-pill {
      font-family: var(--meta); font-size: 0.55rem; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg2);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; box-shadow: 0 0 8px #10b981; }
    .dot.warn { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }

    /* --- ADD VOICE PANEL --- */
    .add-panel { position: absolute; top: 100px; right: 1.5rem; z-index: 20; width: 220px; }
    .add-toggle {
      font-family: var(--meta); font-size: 0.65rem; font-weight: 700;
      background: var(--bg2); border: 1px solid var(--border);
      color: var(--accent); padding: 8px; border-radius: 8px;
      cursor: pointer; width: 100%; text-align: center;
      transition: all 0.2s;
    }
    .add-form {
      display: none; margin-top: 10px; background: rgba(15,23,42,0.98);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 12px; padding: 15px;
      flex-direction: column; gap: 10px;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.8);
    }
    .add-form.open { display: flex; }
    .add-form input, .add-form select {
      background: var(--bg3); border: 1px solid var(--border);
      color: white; padding: 8px; border-radius: 6px; font-size: 12px; width: 100%;
    }
    .submit-btn {
      background: var(--accent); color: white; border: none; padding: 10px;
      border-radius: 6px; font-weight: 700; cursor: pointer;
      font-family: var(--meta); font-size: 10px;
    }

    /* --- VIZ --- */
    svg { width: 100%; height: 100%; cursor: grab; display: block; }
    svg:active { cursor: grabbing; }
    .link { stroke-opacity: 0.15; stroke-width: 1px; }
    .node-circle { stroke-width: 2px; transition: r 0.3s, filter 0.3s; cursor: pointer; }
    .node-circle.illuminated { filter: drop-shadow(0 0 12px rgba(255,255,255,0.4)); }
    .node-circle.shadow { stroke-dasharray: 2,2; opacity: 0.6; }
    .node-label { font-family: var(--meta); font-size: 8px; fill: var(--muted); pointer-events: none; text-transform: uppercase; }

    /* --- DETAIL PANEL --- */
    .node-detail-panel {
      position: absolute; bottom: 1.5rem; left: 1.5rem; width: 320px;
      background: rgba(15,23,42,0.96); backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: 16px; padding: 20px;
      z-index: 30; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    }
    .cat-tag { font-family: var(--meta); font-size: 9px; font-weight: 800; padding: 2px 8px; border-radius: 4px; color: white; }
    .close-btn { float: right; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }
  </style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <p id="loading-msg">INITIALIZING LIVING LIBRARY...</p>
</div>

<header class="brand-header">
  <div>
    <div class="padi-id">WECODED 2026 // PADI BUREAU</div>
    <h1>The Living Library // Shattered Ceilings</h1>
    <p class="tagline">Visualizing the hidden architecture of technological equity.</p>
  </div>
  <div class="status-bar">
    <div class="status-pill"><div class="dot" id="status-dot"></div><span id="status-label">OFFLINE</span></div>
    <div class="status-pill"><span id="node-count">0 NODES</span></div>
  </div>
</header>

<div class="add-panel">
  <button class="add-toggle" onclick="toggleForm()">+ CONTRIBUTE VOICE</button>
  <div class="add-form" id="add-form">
    <input id="f-name" type="text" placeholder="Full Name">
    <select id="f-category">
      <option>Computing</option><option>Mathematics</option><option>Systems</option>
      <option>AI Ethics</option><option>Justice</option>
    </select>
    <input id="f-bio" type="text" placeholder="Key contribution">
    <button class="submit-btn" onclick="submitVoice()">SUBMIT VOICE</button>
    <p id="form-status" style="font-size:9px; text-align:center; margin-top:5px; font-family:var(--meta); color:var(--muted)"></p>
  </div>
</div>

<svg id="viz"></svg>

<div class="node-detail-panel" id="detail" style="display:none;">
  <button class="close-btn" onclick="closeDetail()">×</button>
  <span class="cat-tag" id="d-cat"></span>
  <h2 id="d-name" style="margin-top:10px; font-size: 1.1rem;"></h2>
  <p id="d-bio" style="margin-top:8px; font-size:13px; opacity:0.8; line-height:1.4;"></p>
  <div id="d-meta" style="margin-top:15px; font-family:var(--meta); font-size:9px; color:var(--accent); border-top:1px solid var(--border); padding-top:10px;"></div>
</div>

<script>
  const isLocal = window.location.hostname === 'localhost';
  const SERVER = isLocal ? 'http://localhost:8080' : window.location.origin;
  const WS_URL = window.location.protocol === 'https:' ? `wss://${window.location.host}` : `ws://${window.location.host}`;
  const COLORS = { 'Computing':'#a855f7', 'Mathematics':'#ec4899', 'Systems':'#3b82f6', 'AI Ethics':'#10b981', 'Justice':'#f59e0b', 'Medicine':'#ef4444' };

  const SEED = [
    { id:'h1', name:'Ada Lovelace', category:'Computing', bio:'Wrote the first algorithm for a machine (1843).', status:'shadow' },
    { id:'h2', name:'Katherine Johnson', category:'Mathematics', bio:'NASA mathematician who calculated Apollo 11 trajectories.', status:'shadow' },
    { id:'h3', name:'Gladys West', category:'Mathematics', bio:'Mathematical architect of GPS technology.', status:'shadow' },
    { id:'h4', name:'Hedy Lamarr', category:'Systems', bio:'Co-inventor of frequency-hopping technology (Wi-Fi).', status:'shadow' },
    { id:'h5', name:'Radia Perlman', category:'Systems', bio:'Inventor of Spanning Tree Protocol, vital for the internet.', status:'shadow' },
    { id:'h6', name:'Margaret Hamilton', category:'Computing', bio:'Lead Apollo software engineer; coined "software engineering".', status:'shadow' },
    { id:'h7', name:'Dorothy Vaughan', category:'Computing', bio:'NASA’s first Black supervisor; FORTRAN expert.', status:'shadow' },
    { id:'h8', name:'Mary Jackson', category:'Mathematics', bio:'NASA’s first Black female engineer.', status:'shadow' },
    { id:'h9', name:'Ada E. Yonath', category:'Medicine', bio:'Nobel laureate for ribosome structure research.', status:'shadow' },
    { id:'h10', name:'Annie Easley', category:'Computing', bio:'NASA rocket scientist and early coder.', status:'shadow' },
    { id:'h11', name:'Grace Hopper', category:'Computing', bio:'COBOL pioneer and first compiler inventor.', status:'shadow' },
    { id:'h12', name:'Shafi Goldwasser', category:'Mathematics', bio:'Co-inventor of zero-knowledge proofs.', status:'shadow' },
    { id:'h13', name:'Alice Ball', category:'Medicine', bio:'Developed the first effective leprosy treatment.', status:'shadow' },
    { id:'h14', name:'Anita Borg', category:'Systems', bio:'Founder of the Grace Hopper Celebration.', status:'shadow' },
    { id:'h15', name:'Daphne Koller', category:'AI Ethics', bio:'Coursera co-founder; AI healthcare leader.', status:'shadow' },
    { id:'h16', name:'Mary Lou Jepsen', category:'Systems', bio:'Display tech innovator and Openwater founder.', status:'shadow' },
    { id:'m1', name:'Timnit Gebru', category:'AI Ethics', bio:'Co-founder of Black in AI; bias research pioneer.', status:'illuminated' },
    { id:'m2', name:'Joy Buolamwini', category:'Justice', bio:'Founder of the Algorithmic Justice League.', status:'illuminated' },
    { id:'m3', name:'Fei-Fei Li', category:'AI Ethics', bio:'ImageNet creator; Human-Centered AI pioneer.', status:'illuminated' },
    { id:'m4', name:'Kimberly Bryant', category:'Justice', bio:'Founder of Black Girls Code.', status:'illuminated' },
    { id:'m5', name:'Latanya Sweeney', category:'Justice', bio:'Data privacy pioneer; k-anonymity creator.', status:'illuminated' },
    { id:'m6', name:'Elizabeth Churchill', category:'Systems', bio:'HCI expert and Director at Google.', status:'illuminated' },
    { id:'m7', name:'Cynthia Breazeal', category:'Systems', bio:'Social robotics pioneer at MIT.', status:'illuminated' },
    { id:'m8', name:'Safiya Noble', category:'Justice', bio:'Author of "Algorithms of Oppression".', status:'illuminated' }
  ];

  let nodes = [], links = [], simulation, svg, container, zoom;

  async function boot() {
    try {
      const res = await fetch(`${SERVER}/graph`, { signal: AbortSignal.timeout(4000) });
      const data = await res.json();
      const sIds = new Set(data.nodes.map(n => n.id));
      nodes = [...data.nodes, ...SEED.filter(s => !sIds.has(s.id))];
      links = buildAffinityLinks(nodes);
      setStatus('BUREAU LIVE', 'green');
      connectWS();
    } catch(e) {
      nodes = [...SEED];
      links = buildAffinityLinks(nodes);
      setStatus('LOCAL ARCHIVE', 'warn');
    }
    initViz();
    document.getElementById('loading').classList.add('hidden');
  }

  function buildAffinityLinks(ns) {
    let ls = [];
    ns.forEach((a, i) => ns.forEach((b, j) => {
      if(i < j && a.category === b.category) ls.push({ source: a.id, target: b.id });
    }));
    return ls;
  }

  function initViz() {
    d3.select("#viz").selectAll("*").remove();
    const w = window.innerWidth, h = window.innerHeight;
    const isMobile = w < 768;
    const baseR = isMobile ? 12 : 18;

    svg = d3.select("#viz").attr("viewBox", [0, 0, w, h]);
    container = svg.append("g");

    zoom = d3.zoom().scaleExtent([0.1, 5]).on("zoom", (e) => container.attr("transform", e.transform));
    svg.call(zoom);

    simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(isMobile ? 70 : 110))
      .force("charge", d3.forceManyBody().strength(isMobile ? -180 : -280))
      .force("center", d3.forceCenter(w / 2, h / 2).strength(1))
      .force("collide", d3.forceCollide().radius(d => (d.status === 'illuminated' ? baseR * 1.5 : baseR) + 10));

    const link = container.append("g").selectAll("line").data(links).join("line")
      .attr("class", "link").attr("stroke", "#475569");

    const g = container.append("g").selectAll("g").data(nodes).join("g")
      .call(d3.drag().on("start", dragStart).on("drag", dragging).on("end", dragEnd))
      .on("click", (e, d) => showDetail(d));

    g.append("circle").attr("r", d => d.status === 'illuminated' ? baseR * 1.3 : baseR)
      .attr("class", d => `node-circle ${d.status || 'shadow'}`)
      .attr("fill", d => COLORS[d.category] || "#64748b")
      .attr("stroke", "rgba(255,255,255,0.2)");

    g.append("text").attr("class", "node-label").attr("dy", d => (d.status === 'illuminated' ? baseR * 2.2 : baseR * 1.8))
      .attr("text-anchor", "middle").style("font-size", isMobile ? "7px" : "9px").text(d => d.name);

    simulation.on("tick", () => {
      link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      g.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    // --- AUTO-FIT LOGIC ---
    setTimeout(() => {
      const bounds = container.node().getBBox();
      if (bounds.width === 0) return;
      const midX = bounds.x + bounds.width / 2, midY = bounds.y + bounds.height / 2;
      const scale = 0.8 / Math.max(bounds.width / w, bounds.height / h);
      svg.transition().duration(1000).call(zoom.transform, d3.zoomIdentity.translate(w/2, h/2).scale(scale).translate(-midX, -midY));
    }, 1200);

    document.getElementById('node-count').textContent = `${nodes.length} NODES`;
  }

  function showDetail(d) {
    const el = document.getElementById('detail');
    document.getElementById('d-name').textContent = d.name;
    document.getElementById('d-cat').textContent = d.category;
    document.getElementById('d-cat').style.background = COLORS[d.category];
    document.getElementById('d-bio').textContent = d.bio;
    document.getElementById('d-meta').textContent = `INDEX_ID: ${d.id.toUpperCase()} // PADI BUREAU AUTHENTICATED`;
    el.style.display = 'block';
  }

  function closeDetail() { document.getElementById('detail').style.display = 'none'; }
  function toggleForm() { document.getElementById('add-form').classList.toggle('open'); }

  async function submitVoice() {
    const name = document.getElementById('f-name').value;
    const bio = document.getElementById('f-bio').value;
    if(!name || !bio) return;
    try {
      await fetch(`${SERVER}/event`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ type: 'NODE_ADDED', data: { id: `u-${Date.now()}`, name, category: document.getElementById('f-category').value, bio, status: 'illuminated' }})
      });
      document.getElementById('form-status').textContent = "ADDED ✓";
      setTimeout(() => { toggleForm(); boot(); }, 1000);
    } catch(e) { document.getElementById('form-status').textContent = "ERROR"; }
  }

  function connectWS() { const ws = new WebSocket(WS_URL); ws.onmessage = () => boot(); }
  function setStatus(t, c) { document.getElementById('status-label').textContent = t; document.getElementById('status-dot').className = `dot ${c === 'warn' ? 'warn' : ''}`; }
  function dragStart(e, d) { if (!e.active) simulation.alphaTarget(0.2).restart(); d.fx = d.x; d.fy = d.y; }
  function dragging(e, d) { d.fx = e.x; d.fy = e.y; }
  function dragEnd(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
  window.addEventListener('resize', () => initViz());
  boot();
</script>
</body>
</html>
