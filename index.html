<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PADI Sovereign Bureau: Living Library of Access</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-deep: #020617;
      --bg2:     #0f172a;
      --bg3:     #1e293b;
      --text:    #f8fafc;
      --muted:   #94a3b8;
      --border:  rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body, html {
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100%; width: 100%;
      overflow: hidden;
      touch-action: none;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 100;
      background: var(--bg-deep);
      transition: opacity 0.5s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 36px; height: 36px;
      border: 2px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p {
      font-family: 'JetBrains Mono'; font-size: 10px;
      color: #3b82f6; letter-spacing: 1px;
    }

    /* ── HEADER ── */
    .brand-header {
      position: absolute; top: 0; width: 100%;
      padding: 1.25rem 1.5rem; z-index: 20;
      display: flex; justify-content: space-between; align-items: flex-start;
      background: linear-gradient(to bottom, rgba(2,6,23,0.95) 60%, transparent);
      box-sizing: border-box; pointer-events: none;
    }
    .padi-id {
      font-family: 'JetBrains Mono'; font-size: 0.6rem;
      color: #3b82f6; letter-spacing: 1px;
    }
    h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; margin: 2px 0; }
    .tagline { font-size: 0.7rem; opacity: 0.6; max-width: 340px; line-height: 1.4; }
    .status-bar { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .status-pill {
      font-family: 'JetBrains Mono'; font-size: 0.55rem; font-weight: 700;
      display: flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--bg2);
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #10b981; box-shadow: 0 0 6px #10b981;
    }
    .dot.warn  { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }
    .dot.error { background: #ef4444; box-shadow: 0 0 6px #ef4444; }

    /* ── LEGEND ── */
    .legend {
      position: absolute; bottom: 1.5rem; left: 1.5rem;
      z-index: 20; display: flex; flex-direction: column; gap: 5px;
      pointer-events: none;
    }
    .legend-item {
      display: flex; align-items: center; gap: 7px;
      font-family: 'JetBrains Mono'; font-size: 9px;
      color: var(--muted); text-transform: uppercase;
    }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── NODE DETAIL PANEL ── */
    .node-detail-panel {
      position: absolute; bottom: 1.5rem;
      left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 360px;
      background: rgba(15,23,42,0.98);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 1.1rem;
      animation: slideUp 0.35s cubic-bezier(0.2,0.8,0.2,1);
      z-index: 30; pointer-events: auto;
      box-shadow: 0 25px 50px -10px rgba(0,0,0,0.8);
    }
    @keyframes slideUp {
      from { transform: translate(-50%, 20px); opacity: 0; }
      to   { transform: translate(-50%, 0);    opacity: 1; }
    }
    .cat-tag {
      font-family: 'JetBrains Mono'; font-size: 0.55rem;
      padding: 2px 8px; border-radius: 4px;
      text-transform: uppercase; font-weight: 800;
      color: white; letter-spacing: 0.5px;
    }
    .node-name { margin: 6px 0 4px; font-size: 1rem; font-weight: 700; }
    .node-bio  { font-size: 0.78rem; line-height: 1.5; opacity: 0.88; }
    .node-meta {
      margin-top: 10px; padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,0.07);
      font-family: 'JetBrains Mono'; font-size: 0.55rem;
      color: #60a5fa; display: flex; gap: 12px; flex-wrap: wrap;
    }
    .close-btn {
      float: right; background: none; border: none;
      color: white; cursor: pointer; font-size: 1.2rem;
      opacity: 0.35; pointer-events: auto;
    }
    .close-btn:hover { opacity: 1; }

    /* ── ADD VOICE FORM ── */
    .add-panel {
      position: absolute; top: 80px; right: 1.5rem;
      z-index: 20; width: 220px; pointer-events: auto;
    }
    .add-toggle {
      font-family: 'JetBrains Mono'; font-size: 0.6rem;
      background: var(--bg2); border: 1px solid var(--border);
      color: #3b82f6; padding: 5px 12px; border-radius: 6px;
      cursor: pointer; width: 100%; text-align: center;
      letter-spacing: 0.5px; transition: background 0.15s;
    }
    .add-toggle:hover { background: var(--bg3); }
    .add-form {
      display: none; margin-top: 6px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px;
      flex-direction: column; gap: 7px;
    }
    .add-form.open { display: flex; }
    .add-form input, .add-form select {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 5px;
      padding: 5px 8px; font-size: 11px;
      font-family: 'Inter', sans-serif; width: 100%; outline: none;
    }
    .add-form input:focus, .add-form select:focus {
      border-color: rgba(59,130,246,0.5);
    }
    .add-form label {
      font-family: 'JetBrains Mono'; font-size: 9px;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 1px;
    }
    .submit-btn {
      background: #3b82f6; color: white; border: none;
      border-radius: 5px; padding: 6px; font-size: 11px;
      font-weight: 700; cursor: pointer; width: 100%;
      font-family: 'JetBrains Mono'; letter-spacing: 0.5px;
      transition: background 0.15s;
    }
    .submit-btn:hover  { background: #2563eb; }
    .submit-btn:active { background: #1d4ed8; }
    .form-status {
      font-family: 'JetBrains Mono'; font-size: 9px;
      text-align: center; min-height: 14px;
    }

    /* ── SVG ── */
    svg { width: 100%; height: 100%; cursor: grab; display: block; }
    svg:active { cursor: grabbing; }
    .link { stroke-opacity: 0.2; stroke-width: 1px; }
    .node-circle { stroke-width: 1.5px; cursor: pointer; }
    .node-circle.illuminated { animation: glow 4s ease-in-out infinite; }
    @keyframes glow {
      0%,100% { filter: drop-shadow(0 0 2px rgba(255,255,255,0.08)); }
      50%      { filter: drop-shadow(0 0 9px rgba(255,255,255,0.4)); }
    }
    .node-label {
      font-family: 'JetBrains Mono'; font-size: 8px;
      fill: var(--muted); pointer-events: none;
      text-transform: uppercase; font-weight: 500;
    }

    @media (min-width: 768px) {
      .node-detail-panel {
        left: auto; right: 1.5rem; transform: none; bottom: 1.5rem; max-width: 320px;
      }
      @keyframes slideUp {
        from { transform: translateY(15px); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="loader-ring"></div>
  <p id="loading-msg">INITIALIZING PADI BUREAU...</p>
</div>

<header class="brand-header">
  <div>
    <div class="padi-id">PADI SOVEREIGN BUREAU</div>
    <h1>The Living Library of Access</h1>
    <span class="tagline">A semantic knowledge graph preserving the history of marginalized technical innovation.</span>
  </div>
  <div class="status-bar">
    <div class="status-pill" id="engine-status">
      <div class="dot warn" id="status-dot"></div>
      <span id="status-label">CONNECTING</span>
    </div>
    <div class="status-pill">
      <span id="node-count">0 NODES</span>
    </div>
  </div>
</header>

<!-- FIX: Hidden by default. Only shown when server confirms live. -->
<div class="add-panel" id="add-panel" style="display:none;">
  <button class="add-toggle" onclick="toggleForm()">+ ADD VOICE</button>
  <div class="add-form" id="add-form">
    <div>
      <label>Name</label>
      <input id="f-name" type="text" placeholder="Full name">
    </div>
    <div>
      <label>Category</label>
      <select id="f-category">
        <option>Computing</option>
        <option>Mathematics</option>
        <option>Systems</option>
        <option>AI Ethics</option>
        <option>Justice</option>
        <option>Medicine</option>
      </select>
    </div>
    <div>
      <label>Bio (one line)</label>
      <input id="f-bio" type="text" placeholder="Key contribution">
    </div>
    <button class="submit-btn" onclick="submitVoice()">SUBMIT TO ENGINE</button>
    <div class="form-status" id="form-status"></div>
  </div>
</div>

<div class="legend" id="legend"></div>
<svg id="viz"></svg>

<div class="node-detail-panel" id="detail" style="display:none;">
  <button class="close-btn" onclick="closeDetail()">×</button>
  <span class="cat-tag" id="d-cat"></span>
  <div class="node-name" id="d-name"></div>
  <div class="node-bio"  id="d-bio"></div>
  <div class="node-meta" id="d-meta"></div>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const IS_LOCAL = window.location.hostname === 'localhost'
              || window.location.hostname === '127.0.0.1';

const SERVER = IS_LOCAL
  ? 'http://localhost:8080'
  : 'https://padi-sovereign-bureau.onrender.com';

// FIX: https → wss, http → ws — handles both protocols correctly
const WS_URL = SERVER.replace(/^https/, 'wss').replace(/^http/, 'ws');

const CATEGORY_COLORS = {
  'Computing':   '#a855f7',
  'Mathematics': '#ec4899',
  'Systems':     '#3b82f6',
  'AI Ethics':   '#10b981',
  'Justice':     '#f59e0b',
  'Medicine':    '#ef4444',
  'Meta':        '#64748b'
};

const FALLBACK_NODES = [
  { id:'padi-01', name:'Knowledge Protocol', category:'Meta',        bio:'Semantic logic bridging diverse knowledge nodes.' },
  { id:'h-01',    name:'Ada Lovelace',        category:'Computing',   bio:'Mathematician and first computer programmer (1843).' },
  { id:'h-02',    name:'Katherine Johnson',   category:'Mathematics', bio:'NASA lead for orbital mechanics and trajectory calculation.' },
  { id:'h-03',    name:'Hedy Lamarr',         category:'Systems',     bio:'Inventor of frequency-hopping spread spectrum technology.' },
  { id:'h-04',    name:'Grace Hopper',        category:'Computing',   bio:'Inventor of the first compiler and COBOL pioneer.' },
  { id:'h-05',    name:'Annie Easley',         category:'Computing',   bio:'NASA rocket scientist and early computer programmer.' },
  { id:'h-06',    name:'Alice Ball',           category:'Medicine',    bio:'Developed the Ball Method treatment for leprosy.' },
  { id:'h-07',    name:'Gladys West',          category:'Mathematics', bio:'Primary architect of the mathematical modeling for GPS.' },
  { id:'h-08',    name:'Mary Jackson',         category:'Mathematics', bio:"NASA's first Black female engineer." },
  { id:'m-01',    name:'Timnit Gebru',         category:'AI Ethics',   bio:'Pioneering researcher in algorithmic bias and AI ethics.' },
  { id:'m-02',    name:'Radia Perlman',        category:'Systems',     bio:'Inventor of Spanning Tree Protocol (STP).' },
  { id:'m-03',    name:'Joy Buolamwini',       category:'Justice',     bio:'Founder of the Algorithmic Justice League.' },
  { id:'m-04',    name:'Shafi Goldwasser',     category:'Mathematics', bio:'Co-inventor of zero-knowledge proofs and modern crypto.' },
  { id:'m-05',    name:'Fei-Fei Li',           category:'AI Ethics',   bio:'Created ImageNet; co-director of Stanford HAI.' },
  { id:'m-06',    name:'Elizabeth Churchill',  category:'Systems',     bio:'Specialist in social computing and HCI (Google Director).' },
  { id:'m-07',    name:'Kimberly Bryant',      category:'Justice',     bio:'Electrical engineer and founder of Black Girls Code.' },
  { id:'m-08',    name:'Margaret Hamilton',    category:'Computing',   bio:'Lead Apollo software designer; coined software engineering.' },
  { id:'m-09',    name:'Anita Borg',           category:'Systems',     bio:'Founder of the Institute for Women and Technology.' },
  { id:'m-10',    name:'Latanya Sweeney',      category:'Justice',     bio:'Harvard Professor; pioneer of data privacy research.' },
  { id:'m-11',    name:'Daphne Koller',        category:'AI Ethics',   bio:'Co-founder of Coursera; AI and healthcare expert.' },
  { id:'m-12',    name:'Cynthia Breazeal',     category:'Systems',     bio:'Social robotics pioneer at MIT Media Lab.' },
  { id:'m-13',    name:'Mary Lou Jepsen',      category:'Systems',     bio:'Innovator in display technology and imaging hardware.' },
  { id:'m-14',    name:'Rana el Kaliouby',     category:'AI Ethics',   bio:'Affective computing pioneer; co-founder of Affectiva.' }
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let nodes        = [];
let links        = [];
let influenceMap = {};
let serverLive   = false;
let simulation   = null;
let ws           = null;
let svgSel, containerSel, linkSel, nodeGroupSel;

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
async function boot() {
  setLoading('SYNCHRONIZING PADI NODES...');

  // Always start with the static archive
  nodes = FALLBACK_NODES.map(n => ({ ...n }));

  try {
    // FIX: AbortSignal.timeout() not supported in Safari <16.4
    // Use manual AbortController for broad compatibility
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 4000);

    const [graphRes, influenceRes] = await Promise.all([
      fetch(`${SERVER}/graph`,     { signal: controller.signal }),
      fetch(`${SERVER}/influence`, { signal: controller.signal })
    ]);
    clearTimeout(timer);

    if (!graphRes.ok) throw new Error('Server not reachable');

    const graphData     = await graphRes.json();
    const influenceData = await influenceRes.json();
    influenceMap = influenceData.scores || {};

    // Merge: add server nodes not already in local archive
    const archiveIds = new Set(nodes.map(n => n.id));
    (graphData.nodes || []).forEach(sNode => {
      if (!archiveIds.has(sNode.id)) nodes.push({ ...sNode });
    });

    links = buildLinks(nodes, graphData.edges);
    serverLive = true;
    setStatus('LIVE', 'green');

    // FIX: Only show add panel when server is confirmed live
    document.getElementById('add-panel').style.display = 'block';
    connectWebSocket();

  } catch {
    console.warn('[PADI] Server offline — running on local archive.');
    links = buildFallbackLinks(nodes);
    setStatus('OFFLINE · ARCHIVE MODE', 'error');
    // add-panel stays hidden — no point submitting to a dead server
  }

  buildLegend();
  initViz();
  hideLoading();
}

// ─────────────────────────────────────────────
// LINK BUILDERS
// ─────────────────────────────────────────────
function buildLinks(nodeArr, edgeArr) {
  const result  = [];
  const nodeIds = new Set(nodeArr.map(n => n.id));
  (edgeArr || []).forEach(e => {
    (e.to || []).forEach(t => {
      if (nodeIds.has(e.from) && nodeIds.has(t)) {
        result.push({ source: e.from, target: t });
      }
    });
  });
  // Fall back to category affinity if server has no edges yet
  return result.length > 0 ? result : buildFallbackLinks(nodeArr);
}

function buildFallbackLinks(nodeArr) {
  const result = [];
  nodeArr.forEach((a, i) => {
    nodeArr.forEach((b, j) => {
      if (i < j && a.category === b.category) {
        result.push({ source: a.id, target: b.id });
      }
    });
  });
  return result;
}

function nodeRadius(d) {
  const base  = d.status === 'shadow' ? 13 : 18;
  const score = influenceMap[d.id] || 0;
  return base + Math.min(score * 5, 14);
}

// ─────────────────────────────────────────────
// VISUALISATION
// ─────────────────────────────────────────────
function initViz() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  d3.select('#viz').selectAll('*').remove();
  svgSel       = d3.select('#viz').attr('viewBox', [0, 0, W, H]);
  containerSel = svgSel.append('g');

  // FIX: dblclick filter prevents zoom/node-click conflict
  svgSel.call(
    d3.zoom()
      .scaleExtent([0.25, 4])
      .filter(e => !e.button && e.type !== 'dblclick')
      .on('zoom', e => containerSel.attr('transform', e.transform))
  );

  simulation = d3.forceSimulation(nodes)
    .force('link',      d3.forceLink(links).id(d => d.id).distance(100))
    .force('charge',    d3.forceManyBody().strength(-300))
    .force('center',    d3.forceCenter(W / 2, H / 2))
    .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 12))
    // FIX: Boundary force — clamps all nodes within the visible viewport
    .force('bounds', () => {
      nodes.forEach(d => {
        d.x = Math.max(50, Math.min(W - 50, d.x));
        d.y = Math.max(90, Math.min(H - 70, d.y));
      });
    });

  linkSel = containerSel.append('g')
    .selectAll('line')
    .data(links)
    .join('line')
    .attr('class', 'link');

  nodeGroupSel = containerSel.append('g')
    .selectAll('g')
    .data(nodes)
    .join('g')
    .attr('class', 'node-group')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag',  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end',   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    )
    .on('click', (e, d) => showDetail(d));

  nodeGroupSel.append('circle')
    .attr('class',  d => `node-circle ${d.status || 'shadow'}`)
    .attr('r',      d => nodeRadius(d))
    .attr('fill',   d => CATEGORY_COLORS[d.category] || '#64748b')
    .attr('stroke', d => d.status === 'illuminated' ? 'rgba(255,255,255,0.7)' : 'rgba(255,255,255,0.15)');

  nodeGroupSel.append('text')
    .attr('class', 'node-label')
    .attr('dy',    d => nodeRadius(d) + 12)
    .attr('text-anchor', 'middle')
    .text(d => d.name.length > 14 ? d.name.substring(0, 12) + '..' : d.name);

  // Tick: resolve positions + set link stroke from resolved source object
  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y)
      // Set stroke here — source is now a resolved object, not a string
      .attr('stroke', d => CATEGORY_COLORS[d.source.category] || '#64748b');

    nodeGroupSel.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  updateNodeCount();
}

// ─────────────────────────────────────────────
// INCREMENTAL REFRESH (preserves zoom + positions)
// ─────────────────────────────────────────────
async function refreshFromServer() {
  try {
    const [gRes, iRes] = await Promise.all([
      fetch(`${SERVER}/graph`),
      fetch(`${SERVER}/influence`)
    ]);
    const gData = await gRes.json();
    const iData = await iRes.json();
    influenceMap = iData.scores || {};

    const currentIds = new Set(nodes.map(n => n.id));
    let newNodesAdded = false;

    gData.nodes.forEach(n => {
      if (!currentIds.has(n.id)) {
        nodes.push({ ...n });
        newNodesAdded = true;
      }
    });

    if (newNodesAdded) {
      // Full re-render only when new nodes arrive
      links = buildLinks(nodes, gData.edges);
      initViz();
    }

    flashStatus();
    updateNodeCount();
  } catch (err) {
    console.warn('[PADI] Refresh failed:', err.message);
  }
}

// ─────────────────────────────────────────────
// WEBSOCKET
// ─────────────────────────────────────────────
function connectWebSocket() {
  try {
    ws = new WebSocket(WS_URL);
    ws.onmessage = async (e) => {
      const msg = JSON.parse(e.data);
      if (msg.type === 'UPDATE') await refreshFromServer();
    };
    ws.onerror = () => {};
    ws.onclose = () => { if (serverLive) setTimeout(connectWebSocket, 5000); };
  } catch { /* WebSocket unavailable */ }
}

// ─────────────────────────────────────────────
// ADD VOICE
// ─────────────────────────────────────────────
function toggleForm() {
  document.getElementById('add-form').classList.toggle('open');
}

async function submitVoice() {
  const name     = document.getElementById('f-name').value.trim();
  const category = document.getElementById('f-category').value;
  const bio      = document.getElementById('f-bio').value.trim();
  const statusEl = document.getElementById('form-status');

  if (!name || !bio) {
    statusEl.style.color = '#ef4444';
    statusEl.textContent = 'NAME + BIO REQUIRED';
    return;
  }

  // FIX: Strip special characters from ID to prevent malformed identifiers
  const safeSlug = name.toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9-]/g, '');
  const id = `${safeSlug}-${Date.now()}`;

  statusEl.style.color = '#94a3b8';
  statusEl.textContent = 'TRANSMITTING...';

  try {
    const res = await fetch(`${SERVER}/event`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        type: 'NODE_ADDED',
        data: { id, name, category, bio, status: 'illuminated' }
      })
    });
    const result = await res.json();

    if (result.success) {
      statusEl.style.color = '#10b981';
      statusEl.textContent = 'VOICE ADDED ✓';
      document.getElementById('f-name').value = '';
      document.getElementById('f-bio').value  = '';
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    } else {
      throw new Error(result.error || 'Unknown error');
    }
  } catch (err) {
    statusEl.style.color = '#ef4444';
    statusEl.textContent = 'ERROR: ' + (err.message || 'SERVER DOWN');
  }
}

// ─────────────────────────────────────────────
// DETAIL PANEL
// ─────────────────────────────────────────────
function showDetail(d) {
  const score = influenceMap[d.id];
  document.getElementById('d-cat').textContent       = d.category;
  document.getElementById('d-cat').style.background  = CATEGORY_COLORS[d.category] || '#64748b';
  document.getElementById('d-name').textContent      = d.name;
  document.getElementById('d-bio').textContent       = d.bio || '—';
  document.getElementById('d-meta').innerHTML =
    `<span>ID: ${d.id}</span>` +
    (score != null ? `<span>INFLUENCE: ${score.toFixed(3)}</span>` : '') +
    (serverLive
      ? '<span style="color:#10b981">● LIVE</span>'
      : '<span style="color:#f59e0b">● CACHED</span>');
  document.getElementById('detail').style.display = 'block';
}

function closeDetail() {
  document.getElementById('detail').style.display = 'none';
}

// ─────────────────────────────────────────────
// LEGEND
// ─────────────────────────────────────────────
function buildLegend() {
  const cats = [...new Set(nodes.map(n => n.category))];
  document.getElementById('legend').innerHTML = cats.map(c => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${CATEGORY_COLORS[c] || '#64748b'}"></div>
      ${c}
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────
function setLoading(msg) {
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading').classList.remove('hidden');
}

function hideLoading() {
  document.getElementById('loading').classList.add('hidden');
}

function setStatus(label, state) {
  document.getElementById('status-label').textContent = label;
  const dot = document.getElementById('status-dot');
  dot.className = 'dot' + (state === 'error' ? ' error' : state === 'green' ? '' : ' warn');
}

function flashStatus() {
  const pill = document.getElementById('engine-status');
  pill.style.borderColor = '#10b981';
  setTimeout(() => { pill.style.borderColor = ''; }, 800);
}

function updateNodeCount() {
  document.getElementById('node-count').textContent = `${nodes.length} NODES`;
}

window.addEventListener('resize', () => { if (nodes.length) initViz(); });

boot();
</script>
</body>
</html>
