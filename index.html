<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PADI Sovereign Bureau</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #020617; --text: #f8fafc; --accent: #3b82f6; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
    header { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
    .padi-label { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); }
    svg { width: 100vw; height: 100vh; cursor: grab; }
    .node { stroke: rgba(255,255,255,0.2); stroke-width: 1.5px; cursor: pointer; }
    .link { stroke: #334155; stroke-opacity: 0.4; }
    .label { font-family: 'JetBrains Mono'; font-size: 9px; fill: #94a3b8; pointer-events: none; }
    #panel { position: absolute; bottom: 20px; right: 20px; background: rgba(15,23,42,0.9); padding: 20px; border-radius: 12px; border: 1px solid #1e293b; width: 280px; }
  </style>
</head>
<body>

<header>
  <div class="padi-label">PADI SOVEREIGN BUREAU v14.2</div>
  <h1>Living Library</h1>
</header>

<svg id="viz"></svg>

<div id="panel">
  <h3 id="d-name">Select a Node</h3>
  <p id="d-bio" style="font-size: 13px; opacity: 0.8;"></p>
  <div id="d-meta" style="font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent);"></div>
</div>

<script>
  const API = window.location.origin;
  const WS_URL = API.replace(/^http/, 'ws');
  const COLORS = { Computing: '#a855f7', Systems: '#3b82f6', Justice: '#f59e0b', Default: '#64748b' };

  let nodes = [], links = [], scores = {};

  async function sync() {
    const [gRes, iRes] = await Promise.all([fetch(`${API}/graph`), fetch(`${API}/influence`)]);
    const graph = await gRes.json();
    const inf = await iRes.json();
    
    nodes = graph.nodes;
    scores = inf.scores;
    links = [];
    graph.edges.forEach(e => e.to.forEach(t => links.push({ source: e.from, target: t })));
    render();
  }

  function render() {
    const svg = d3.select("#viz");
    svg.selectAll("*").remove();
    const width = window.innerWidth, height = window.innerHeight;

    const g = svg.append("g");
    svg.call(d3.zoom().on("zoom", (e) => g.attr("transform", e.transform)));

    const sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(120))
      .force("charge", d3.forceManyBody().strength(-200))
      .force("center", d3.forceCenter(width / 2, height / 2));

    const link = g.append("g").selectAll("line").data(links).join("line").attr("class", "link");

    const node = g.append("g").selectAll("g").data(nodes).join("g")
      .on("click", (e, d) => {
        document.getElementById('d-name').innerText = d.name;
        document.getElementById('d-bio').innerText = d.bio || "No archival bio.";
        document.getElementById('d-meta').innerText = `INFLUENCE: ${scores[d.id] || 0}`;
      })
      .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

    node.append("circle")
      .attr("r", d => 10 + (scores[d.id] || 0) * 2)
      .attr("fill", d => COLORS[d.category] || COLORS.Default);

    node.append("text").attr("class", "label").attr("dy", 25).attr("text-anchor", "middle")
      .text(d => d.name);

    sim.on("tick", () => {
      link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      node.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    function dragstarted(e, d) { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
    function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
    function dragended(e, d) { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }
  }

  const ws = new WebSocket(WS_URL);
  ws.onmessage = () => sync();
  sync();
</script>
</body>
</html>
